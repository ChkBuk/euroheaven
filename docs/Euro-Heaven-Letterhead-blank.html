<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<title>Euro Heaven · Letterhead</title>
<style>
  :root {
    --ink: #0a0a0a;
    --muted: #5f5f5f;
    --soft: #9a9a9a;
    --rule: #c8c8c8;
    --accent: #1e3a8a;
  }
  * { box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font: 13.5px/1.7 "Roboto", -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: #fff;
    margin: 0;
    padding: 0;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* A4 sheet. The fixed sheet padding leaves a clean ~22mm gutter that
     matches international business correspondence conventions. */
  .sheet {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    padding: 18mm 22mm 16mm;
    display: flex;
    flex-direction: column;
    background: #fff;
  }

  /* ---------- HEADER ---------- */
  .lh-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 14px;
    border-bottom: 2.5px solid var(--ink);
  }
  .lh-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .lh-logo img {
    height: 64px;
    width: auto;
    display: block;
  }
  .lh-brand h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 5px;
    line-height: 1;
  }
  .lh-brand .tagline {
    margin: 6px 0 0;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
  }
  .lh-contact {
    text-align: right;
    font-size: 10.5px;
    line-height: 1.55;
    color: var(--muted);
  }
  .lh-contact .row { color: var(--ink); }
  .lh-contact .label {
    color: var(--soft);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 9px;
    margin-top: 4px;
  }

  /* ---------- LETTER BODY (where typed/handwritten content goes) ---------- */
  .lh-body {
    flex: 1;
    padding: 18px 0 12px;
    font-size: 13.5px;
    line-height: 1.75;
  }
  .lh-body p { margin: 0 0 14px; }
  .lh-body .date {
    text-align: right;
    margin-bottom: 36px;
  }
  .lh-body .signoff {
    margin-top: 64px;
  }
  /* Subtle placeholder treatment — light grey so it visually fades
     when previewed but prints fine. Replace bracketed text with actual
     content before printing. Or leave blank and handwrite. */
  .lh-body .placeholder { color: var(--soft); }

  /* ---------- FOOTER ---------- */
  .lh-footer {
    border-top: 1px solid var(--rule);
    padding-top: 10px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    text-align: center;
    font-size: 10px;
    line-height: 1.5;
    color: var(--muted);
    page-break-inside: avoid;
  }
  .lh-footer .col .label {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 8.5px;
    color: var(--soft);
    margin-bottom: 3px;
  }
  .lh-footer .col .value { color: var(--ink); }
  .lh-footer a { color: var(--ink); text-decoration: none; }

  /* ---------- PRINT ---------- */
  @page { size: A4; margin: 0; }
  @media print {
    .sheet { box-shadow: none; }
    /* Hide the "edit this template" callout on print, in case it's
       added in non-blank variants. */
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<div class="sheet">

  <!-- ============ HEADER ============ -->
  <header class="lh-header">
    <div class="lh-logo">
      <img src="../public/logo.png" alt="Euro Heaven">
      <div class="lh-brand">
        <h1>EURO HEAVEN</h1>
        <div class="tagline">Melbourne's Trusted Mercedes-Benz Specialists</div>
      </div>
    </div>
    <div class="lh-contact">
      <div class="row">0400 115 765</div>
      <div class="row">info@euroheaven.com.au</div>
      <div class="row">euroheaven.com.au</div>
    </div>
  </header>

  <!-- ============ LETTER BODY ============ -->
  <!-- Edit between the comment markers, or print blank and handwrite. -->
  <main class="lh-body"></main>

  <!-- ============ FOOTER ============ -->
  <footer class="lh-footer">
    <div class="col">
      <div class="label">Workshop</div>
      <div class="value">27 Podmore Street<br>Dandenong VIC 3175<br>Australia</div>
    </div>
    <div class="col">
      <div class="label">Contact</div>
      <div class="value">
        <a href="tel:+61400115765">0400 115 765</a><br>
        <a href="mailto:info@euroheaven.com.au">info@euroheaven.com.au</a>
      </div>
    </div>
    <div class="col">
      <div class="label">Web · ABN</div>
      <div class="value">
        <a href="https://euroheaven.com.au">euroheaven.com.au</a><br>
        ABN 20 657 028 585
      </div>
    </div>
  </footer>

</div>
</body>
</html>
