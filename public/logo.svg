<svg viewBox="0 0 1600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Euro Heaven logo">
  <title>Euro Heaven</title>
  <defs>
    <!-- Star: outer radius 65, inner radius ~24.83 -->
    <symbol id="star" viewBox="-65 -65 130 130">
      <polygon points="0,-65 14.60,-20.09 61.82,-20.09 23.62,7.67 38.21,52.59 0,24.83 -38.21,52.59 -23.62,7.67 -61.82,-20.09 -14.60,-20.09"/>
    </symbol>
  </defs>

  <!-- Brand accent blue background -->
  <rect width="1600" height="800" fill="#2b6dff"/>

  <!-- EURO wordmark — euro symbol substitutes the E.
       EURO top (~156) and HEAVENS baseline (644) are symmetric around y=400
       so the text block sits perfectly vertically centred. -->
  <text x="130" y="444"
        fill="#FFFFFF"
        font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
        font-size="400"
        font-weight="900"
        letter-spacing="15">&#8364;URO</text>

  <!-- HEAVEN subtitle — light weight, wide tracking -->
  <text x="130" y="644"
        fill="#FFFFFF"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="180"
        font-weight="500"
        letter-spacing="70">HEAVEN</text>

  <!-- 7 gold stars forming the right semicircle. Circle centre (1270, 300),
       radius 205, star radius 65. Midpoint of top (95) + bottom (505) = 300,
       aligning with the vertical centre of the O. -->
  <g fill="#FFCC00">
    <use href="#star" x="1205" y="30" width="130" height="130"/>
    <use href="#star" x="1308" y="57" width="130" height="130"/>
    <use href="#star" x="1383" y="133" width="130" height="130"/>
    <use href="#star" x="1410" y="235" width="130" height="130"/>
    <use href="#star" x="1383" y="337" width="130" height="130"/>
    <use href="#star" x="1308" y="413" width="130" height="130"/>
    <use href="#star" x="1205" y="440" width="130" height="130"/>
  </g>
</svg>
