<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer + inner rings form the classic circular crest -->
  <circle cx="50" cy="50" r="46"/>
  <circle cx="50" cy="50" r="34"/>
  <!-- Vertical divider between the two halves -->
  <line x1="50" y1="16" x2="50" y2="84"/>
  <!-- Milanese cross (left half) -->
  <line x1="32" y1="32" x2="32" y2="68"/>
  <line x1="18" y1="50" x2="46" y2="50"/>
  <!-- Simplified serpent (biscione) silhouette on the right half -->
  <path d="M58 32 Q 66 36 70 50 Q 74 64 82 68"/>
  <circle cx="82" cy="68" r="2" fill="#ffffff" stroke="none"/>
</svg>
